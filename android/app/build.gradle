plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    id "org.jetbrains.kotlin.android" version "2.1.0"
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id 'com.google.firebase.appdistribution' version '4.0.0'
}

android {
    namespace = "com.example.finalproject"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.finalproject"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 34
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }
    // Thêm flavor dimensions và product flavors
    flavorDimensions += "environment"
    productFlavors {
        create("dev") {
            dimension = "environment"
            applicationIdSuffix = ".dev"
            versionNameSuffix = "-dev"
            resValue("string", "app_name", "My App Dev")
        }
        create("staging") {
            dimension = "environment"
            applicationIdSuffix = ".staging"
            versionNameSuffix = "-staging"
            resValue("string", "app_name", "My App Staging")
        }
        create("production") {
            dimension = "environment"
            resValue("string", "app_name", "My App")
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug

            firebaseAppDistribution {
                releaseNotesFile="./release-notes.txt"   // Ghi chú bản phát hành
                testers="email1@example.com,email2@example.com"
            }
        }
    }


}

flutter {
    source = "../.."
}
dependencies {
    // ⚙️ Thêm dòng này để bật desugaring (bắt buộc)
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // (Tùy chọn) Nếu có plugin khác cần Java 8, vẫn ok
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8"

    // 🔥 Giữ nguyên các dependencies khác (Flutter sẽ tự thêm phần còn lại)
}
